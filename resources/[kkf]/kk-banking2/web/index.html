<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="style.css" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="nui://kk-core/web/cdn/alpine.min.js"></script>

    <script src="script.js"></script>

    <title>Kasutaja Banking</title>

    <style>
        /* width */
        ::-webkit-scrollbar {
            width: 10px;
        }

        /* Track */
        ::-webkit-scrollbar-track {
            background: #1E1E1E;
        }

        /* Handle */
        ::-webkit-scrollbar-thumb {
            background: #3F3F46;
        }

        /* Handle on hover */
        ::-webkit-scrollbar-thumb:hover {
            background: #52525B;
        }

        /* Chrome, Safari, Edge, Opera */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Firefox */
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body 
    x-data="banking"
    x-init="init()"
    @keydown.window="handleKeydown"
    x-show="open"
    :style="{ opacity: hovering ? '0.5' : '1' }"
>
    <div 
        style="position: absolute; margin: 0 auto; left: 50%; transform: translate(-50%, -50%); top: 40vh; width:85rem;height:42rem"
        class="bg-zinc-800 text-white font-sans rounded shadow"
    >
        <div  
            class="absolute h-12 w-full -mt-10"

            @mouseenter="hovering = true"
            @mouseleave="hovering = false"
        ></div>

        <div class="h-full w-full px-6 py-4 overflow-hidden">
            <!-- Header -->
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-3xl font-semibold">Tere tulemast, <span x-text="accountName"></span>!</h1>

                <button @click="closeTablet()" class="flex bg-zinc-900 text-sm p-2 rounded border border-zinc-700 shadow hover:bg-zinc-800 transition">
                    Sulge
                </button>
            </div>
        
            <!-- Main Content -->
            <div class="w-full h-full grid grid-cols-4 gap-6">
                <!-- Accounts -->
                <div class="col-span-1 bg-zinc-900 p-4 rounded shadow">
                    <h2 class="text-xl font-medium mb-4">Arvelduskontod</h2>
                    <div class="space-y-3">
                        <div 
                            class="p-3 rounded flex justify-between items-center transition cursor-pointer"
                            :class="{
                                'bg-zinc-800 hover:bg-zinc-700': currentAccount != 'personal',
                                'bg-sky-700 hover:bg-sky-600 text-white': currentAccount === 'personal',
                            }"
                            @click = 'swapAccount("personal")'
                        >
                            <span>Personaalne konto</span>
                            <span class="font-semibold">$<span x-text="personalAccountMoney"></span></span>
                        </div>

                        <div
                            x-show="factionAccountMoney"
                            class="p-3 rounded flex justify-between items-center transition cursor-pointer"
                            :class="{
                                'bg-zinc-800 hover:bg-zinc-700': currentAccount != 'faction',
                                'bg-sky-700 hover:bg-sky-600 text-white': currentAccount === 'faction',
                            }"
                            @click = 'swapAccount("faction")'
                        >
                            <span>Fraktsiooni konto</span>
                            <span class="font-semibold">$<span x-text="factionAccountMoney"></span></span>
                        </div>
                    </div>
                </div>

                <!-- Account Transaction -->
                <div class="col-span-2 bg-zinc-900 p-4 rounded shadow">
                    <h2 class="text-xl font-medium mb-4">Sisse- ja väljamaksed</h2>

                    <div class="flex space-x-4 mb-4">
                        <button 
                            class="flex-1 py-2 text-white rounded shadow transition"
                            :class="{
                                'bg-zinc-700 hover:bg-zinc-600': currentTransaction != 'in',
                                'bg-sky-700 hover:bg-sky-600': currentTransaction === 'in',
                            }"
                            @click="swapTransaction('in')"
                        >
                            Sissemakse
                        </button>
                        <button 
                            class="flex-1 py-2 text-white rounded shadow transition"
                            :class="{
                                'bg-zinc-700 hover:bg-zinc-600': currentTransaction != 'out',
                                'bg-sky-700 hover:bg-sky-600': currentTransaction === 'out',
                            }"
                            @click="swapTransaction('out')"
                        >
                            Väljamakse
                        </button>
                    </div>

                    <input 
                        type="number" 
                        placeholder="Summa" 
                        class="w-full px-4 py-2 bg-zinc-800 rounded focus:outline-none focus:ring-2 focus:ring-sky-500 mb-4 transition"
                        x-model="outInAmount"
                    >

                    <button @click="moneyOutIn()" class="w-full py-2 bg-sky-700 text-white rounded shadow hover:bg-sky-600 transition">Kinnita</button>
                </div>
        
                <!-- Transfer Money -->
                <div class="col-span-1 bg-zinc-900 p-4 rounded shadow">
                    <h2 class="text-xl font-medium mb-4">Maksed</h2>

                    <!--<div class="flex space-x-4 mb-4">
                        <button 
                            class="flex-1 py-2 text-white rounded shadow transition"
                            :class="{
                                'bg-zinc-700 hover:bg-zinc-600': currentTransfer != 'personal',
                                'bg-sky-700 hover:bg-sky-600': currentTransfer === 'personal',
                            }"
                            @click = 'swapTransfer("personal")'
                        >
                            Isik
                        </button>
                        <button 
                            class="flex-1 py-2 text-white rounded shadow transition blur-lg"
                            :class="{
                                'bg-zinc-700 hover:bg-zinc-600': currentTransfer != 'faction',
                                'bg-sky-700 hover:bg-sky-600': currentTransfer === 'faction',
                            }"
                            @click = 'swapTransfer("faction")'
                        >
                            Fraktsioon
                        </button>
                    </div>-->

                    <div class="space-y-4">
                        <input
                            type="number"
                            placeholder="Saaja" 
                            class="w-full px-4 py-2 bg-zinc-800 rounded focus:outline-none focus:ring-2 focus:ring-sky-500 transition"
                            x-model="recieverIdentifier"
                        >

                        <input 
                            type="number" 
                            placeholder="Summa" 
                            class="w-full px-4 py-2 bg-zinc-800 rounded focus:outline-none focus:ring-2 focus:ring-sky-500 transition"
                            x-model="recieverAmount"
                        >

                        <button @click="sendMoney()" class="w-full py-2 bg-sky-700 text-white rounded shadow hover:bg-sky-600 transition">Kinnita makse</button>
                    </div>
                </div>
        
                <!-- Latest Transactions -->
                <div class="col-span-2 bg-zinc-900 p-4 rounded shadow w-full h-3/4 overflow-y-auto">
                    <h2 class="text-xl font-medium text-white mb-4">Viimased tehingud</h2>

                    <div class="space-y-4">
                        <template  x-for="(value, index) in logs" :key="index">
                            <!-- Transaction Example 1 -->
                            <div class="bg-zinc-800 p-4 rounded flex justify-between items-center">
                                <div class="flex items-center">
                                    <!-- Green Arrow for Deposit -->
                                    <div x-show="value.type === 'in'" class="bg-green-600 p-2 rounded-full">
                                        <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18" />
                                        </svg>
                                    </div>

                                    <div x-show="value.type === 'out'" class="bg-red-600 p-2 rounded-full">
                                        <svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
                                        </svg>
                                    </div>

                                    <div class="ml-4">
                                        <div x-text="value.type === 'in' && 'Laekumine' || value.type === 'out' && 'Väljaminek'" class="font-semibold text-white"></div>
                                        <div x-text="value.description" class="text-sm text-zinc-400"></div>
                                        <div x-text="formatDate(value.time)" class="text-xs text-zinc-500"></div>
                                    </div>
                                </div>

                                <div class="text-right">
                                    <div x-show="value.type === 'in'" class="text-green-500 font-semibold">+ $<span x-text="value.amount"></span></div>
                                    <div x-show="value.type === 'out'" class="text-red-500 font-semibold">- $<span x-text="value.amount"></span></div>
                                </div>
                            </div>
                        </template>

                        <template x-if="logs.length === 0">
                            <!-- Empty State -->
                            <div class="text-center py-4 bg-zinc-800 rounded mt-4">
                                Viimaste tehingute andmed puuduvad.
                            </div>
                        </template>
                    </div>
                </div>
        
                <!-- Latest Invoices -->
                <div class="col-span-2 bg-zinc-900 p-4 rounded shadow w-full h-3/4 overflow-y-auto">
                    <h2 class="text-xl font-medium mb-4">Viimased arved</h2>
                
                    <div class="space-y-4">
                        <template x-for="(value, index) in invoices" :key="index">
                            <!-- Invoice Item -->
                            <div class="bg-zinc-800 p-4 rounded flex justify-between items-center">
                                <div>
                                    <div x-text="value.label" class="text font-semibold"></div>
                                    <div class="text-sm text-zinc-400">Tähtaeg: <span x-text="formatDate(value.time + +172800000)"></span></div>
                                </div>

                                <div class="flex items-center space-x-4">
                                    <div class="text font-medium text-red-500">$<span x-text="value.amount"></span></div>
                                    <span 
                                        class="text-white text-xs font-bold py-1 px-2 rounded-full"
                                        :class="{
                                            'bg-red-600': timePassed(value.time) >= 2,
                                            'bg-yellow-500': timePassed(value.time) < 2,
                                        }"
                                    >
                                        Tasumata
                                    </span>
                                    <button @click="payInvoice(value.id)" class="bg-sky-700 text-white px-3 py-2 rounded hover:bg-sky-600 transition">Maksa</button>
                                </div>
                            </div>
                        </template>

                        <template x-if="invoices.length === 0">
                            <!-- Empty State -->
                            <div class="text-center py-4 bg-zinc-800 rounded mt-4">
                                Teil ei ole ühtegi tasumata arvet!
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <img src="nui://kk-core/web/cdn/frame.png" alt="tablet" class="tablet-frame" style="pointer-events: none; position: absolute; margin: 0 auto; left: 50%; transform: translate(-50%, -50%); top: 40vh; width:89.5rem;height:45.5rem"/>
</body>
</html>
