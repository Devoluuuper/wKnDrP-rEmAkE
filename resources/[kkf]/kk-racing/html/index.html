<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KK Racing</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
</head>
    <body>
        <div class="absolute w-80 h-32 bottom-24 rounded right-5">
            <div id="editor" class="bg-gray-900 bg-opacity-50 rounded-t rounded-b hidden">
                <header class="bg-gray-900 text-gray-200 px-2 py-1 font-medium bg-opacity-80 rounded-t">Raja loomine</header>

                <div class="px-2 py-1 text-gray-200">
                    <div class="grid grid-cols-2">
                        <div>Rada:</div><div class="text-right font-medium" id="editor-racename">Test race</div> 
                        <div>Kontrollpunktid:</div><div class="text-right font-medium" id="editor-checkpoints">1 / ?</div> 
                        <div>Lisa punkt:</div><div class="text-right font-medium" id="editor-keys-add"><span class="bg-gray-200 text-gray-800 text-xs font-semibold px-1.5 py-0.5 rounded">7</span></div>
                        <div>Rehvivahe [<span id="editor-keys-tiredistance">0</span>]:</div><div class="text-right font-medium" id="editor-checkpoints"><span class="bg-gray-200 text-gray-800 text-xs font-semibold px-1.5 py-0.5 rounded">SCROLLWHEEL</span></div>
                        <div>Katkesta loomine:</div><div class="text-right font-medium" id="editor-keys-cancel"><span class="bg-gray-200 text-gray-800 text-xs font-semibold px-1.5 py-0.5 rounded">9</span></div>
                        <div>Salvesta:</div><div class="text-right font-medium" id="editor-keys-save"><span class="bg-gray-200 text-gray-800 text-xs font-semibold px-1.5 py-0.5 rounded">F3</span></div>
                        <div>Eemalda punkt [<span id="editor-pointId"></span>]:</div><div class="text-right font-medium"><span class="bg-gray-200 text-gray-800 text-xs font-semibold px-1.5 py-0.5 rounded">8</span></div>
                    </div>
                </div>
            </div>

            <div id="race" class="bg-gray-900 bg-opacity-50 rounded hidden">
                <div class="px-2 py-1 text-gray-200">
                    <div class="grid grid-cols-2">
                        <div>Rada:</div><div class="text-right font-medium" id="race-racename">Test race</div>
                        <div>Punktid:</div><div class="text-right font-medium" id="race-checkpoints">1 / 1</div>
                        <div>Ring:</div><div class="text-right font-medium" id="race-lap">1 / 1</div>
                        <div>Hetkene ring:</div><div class="text-right font-medium" id="race-time">00:00.00</div>
                        <div>Parim ring:</div><div class="text-right font-medium" id="race-besttime">00:00.00</div>
                        <div>Aeg:</div><div class="text-right font-medium" id="race-totaltime">00:00.00</div>
                    </div>
                </div>
            </div>
        </div>
    </body>
    <script src="./script.js"></script>
</html>
