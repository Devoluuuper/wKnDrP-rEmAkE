<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="nui://kk-core/web/cdn/jquery.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="script.js"></script>

    <title>KKasutaja Stancer</title>

    <style>
        select:focus, textarea:focus, input:focus{
            outline: none;
        }
    </style>
</head>
<body>
    <div id="container" class="absolute right-5 top-5 p-2 rounded shadow bg-zinc-800 text-zinc-300 border border-zinc-700 w-80 hidden">
        <h1 class="text-center font-medium uppercase text-xl">Stancer</h1>
    
        <div id="fWheelOffset" class="menu-item">
            <div class="flex justify-between">
                <label for="wheelof">Front Offset</label>
                <div class="px-2 shadow rounded border border-zinc-700 bg-zinc-900" id="fWheelOffset_amount">0</div>
            </div>

            <input class="w-full h-2 rounded appearance-none cursor-pointer bg-zinc-700" type="range" id="fWheelOffset_value">
        </div>
    
        <div id="rWheelOffset" class="menu-item">
            <div class="flex justify-between">
                <label for="wheelor">Rear Offset</label>
                <div class="px-2 shadow rounded border border-zinc-700 bg-zinc-900" id="rWheelOffset_amount">0</div>
            </div>

            <input class="w-full h-2 rounded appearance-none cursor-pointer bg-zinc-700" type="range" id="rWheelOffset_value">
        </div>

        <div id="fWheelRotation" class="menu-item">
            <div class="flex justify-between">
                <label for="wheelor">Front Rotation</label>
                <div class="px-2 shadow rounded border border-zinc-700 bg-zinc-900" id="fWheelRotation_amount">0</div>
            </div>

            <input class="w-full h-2 rounded appearance-none cursor-pointer bg-zinc-700" type="range" id="fWheelRotation_value">
        </div>

        <div id="rWheelRotation" class="menu-item">
            <div class="flex justify-between">
                <label for="wheelrr">Rear Rotation</label>
                <div class="px-2 shadow rounded border border-zinc-700 bg-zinc-900" id="rWheelRotation_amount">0</div>
            </div>

            <input class="w-full h-2 rounded appearance-none cursor-pointer bg-zinc-700" type="range" id="rWheelRotation_value">
        </div>

        <button id="saveVehicle" class="w-full py-1.5 bg-green-700 hover:bg-green-800 text-white rounded shadow mt-1">Salvesta</button>
    </div>
</body>
</html>
