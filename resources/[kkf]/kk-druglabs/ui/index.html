<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">

    <script src="nui://kk-core/web/cdn/alpine.min.js" defer></script>
    <script src="https://code.jquery.com/jquery-3.1.1.min.js"></script>
    <script src="script.js"></script>

    <style>
        ::-webkit-scrollbar {
			display: none;
		}

        textarea:focus, input:focus{
            outline: none;
        }
    </style>
</head>
<body x-data="{activePage: 'shop'}" style="display: none; position: absolute; margin: 0 auto; left:1vh; right: 0; top: 6vh; width:79rem; height:47rem; overflow-y: scroll; overflow-y: hidden;">
    <img src="nui://kk-core/web/cdn/frame.png" style="pointer-events: none; position: fixed; margin: 0 auto; left: 1rem; right: 0; top: 4.2vh; width: 82rem; height: 50rem; z-index: 9999;">

    <div id="mainContent" class="h-screen flex overflow-hidden"
            style="max-height: 100%; background-color: #1a202c;">

            <!-- Static sidebar for desktop -->
            <div class="hidden md:flex md:flex-shrink-0">
                <div class="flex flex-col w-64">
                    <!-- Sidebar component, swap this element with another sidebar if you like -->
                    <div class="flex flex-col h-0 flex-1 bg-gray-800">
                        <div class="flex-1 flex flex-col pt-6 pb-8 px-2 overflow-y-auto">
                            <div class="flex">
                                <i class="fa-solid fa-pills text-2xl text-white font-semibold ml-4 mt-0"></i>
                                <h1 class="text-lg text-white font-semibold ml-3">Labor</h1>
                            </div>
                            <nav class="mt-5 flex-1 px-2 bg-gray-800 space-y-1">
                                <a @click="activePage = 'shop'" href="#"
                                    :class="{ 'bg-gray-900 text-white': activePage === 'shop', 'text-gray-300 hover:bg-gray-700 hover:text-white' : activePage !== 'shop'}"
                                    class="group flex items-center px-2 py-2 text-md font-semibold rounded-md">
                                    <i :class="{ 'text-gray-300': activePage === 'shop', 'text-gray-400 group-hover:text-gray-300' : activePage !== 'shop'}"
                                        class="fa-solid fa-hard-drive text-lg mr-3 mt-1 h-6 w-6">
                                    </i>
                                    Tellimine
                                </a>

                                <a @click="activePage = 'settings'" href="#"
                                    :class="{ 'bg-gray-900 text-white': activePage === 'settings', 'text-gray-300 hover:bg-gray-700 hover:text-white' : activePage !== 'settings'}"
                                    class="group flex items-center px-2 py-2 text-md font-semibold rounded-md">
                                    <i :class="{ 'text-gray-300': activePage === 'settings', 'text-gray-400 group-hover:text-gray-300' : activePage !== 'settings'}"
                                        class="fa-solid fa-gear text-lg mr-3 mt-1 h-6 w-6">
                                    </i>
                                    Sätted
                                </a>
                            </nav>
                        </div>
                    </div>
                </div>
            </div>

        <div class="px-4 py-2 text-gray-200 overflow-y-auto">
            <div x-show="activePage === 'shop'">
                <ul class="mt-8 grid grid-cols-5 gap-6" id="shop"></ul>
            </div>

            <div x-show="activePage === 'settings'" class="py-6">

                    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <h1 class="text-2xl font-semibold" style="color:white;">Settings</h1>
                    </div>
                    
                    <div class="max-w-7xl mx-auto px-4 sm:px-6 md:px-8">
                        <div class="space-y-8 divide-y divide-gray-200">
                            <div class="mt-5">

                                <div class="bg-gray-800 rounded-lg shadow">
                                    <div class="p-4">
                                        <h3 class="text-lg font-bold text-white mb-2">Koodi muutmine</h3>
                                        <p class="text-sm text-gray-400 mb-4">Saad muuta oma druglabsi koodi siin.</p>

                                        <div class="flex">
                                            <input id="pinInput" type="password"
                                                class="flex-1 py-2 px-4 rounded-l-lg focus:outline-none focus:ring-2 focus:ring-blue-500 bg-gray-900 text-white placeholder-gray-500"
                                                placeholder="Sisesta uus kood..">
                                            <button id="changePin" type="button"
                                                class="ml-2 py-2 px-6 bg-blue-600 hover:bg-blue-700 rounded-r-lg text-white font-medium focus:outline-none focus:ring-2 focus:ring-blue-500">
                                                Kinnita</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>             
    </div>
</body>
</html>
