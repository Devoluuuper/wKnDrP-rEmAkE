<!doctype html>

<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KK Properties</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@ryangjchandler/spruce@2.x.x/dist/spruce.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/alpinejs/alpine@v2.x.x/dist/alpine.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="nui://kk-core/web/cdn/jquery.min.js"></script>
    <script src="script.js" type="text/javascript"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
</head>
<body>
<div id="tabletBody" x-data="{activeTab: 'sold'}" style="display:none;position: absolute; margin: 0 auto; left:1vh; right: 0; top: 6vh; width:78rem;height:43rem; background-color: white;">
    <nav class="sticky top-0 z-40 lg:z-50 w-full max-w-8xl mx-auto bg-gray-800">
        <img src="nui://kk-core/web/cdn/frame.png" style="pointer-events: none; position: fixed; margin: 0 auto; left: 1rem; right: 0; top: 4.2vh; width: 82rem; height: 50rem">
        <div class="max-w-7xl mx-auto px-2 sm:px-6 lg:px-8">
          <div class="relative flex items-center justify-between h-16">
            <div class="flex-1 flex items-center justify-center sm:items-stretch sm:justify-start">
              <div class="flex-shrink-0 flex items-center">
                <h4 style="color: white">Maakler</h4>
              </div>
              <div class="hidden sm:block sm:ml-6">
                <div class="flex space-x-4">
                    <a id="testButton" @click="activeTab = 'asd'" href="#" style="display: none;"></a>
                    <a id="profileButton" @click="activeTab = 'profile'" href="#" style="display: none;"></a>

                    <a @click="activeTab = 'sold'"
                        :class="{ 'bg-gray-900 text-white': activeTab === 'sold', 'text-gray-300 hover:bg-gray-700 hover:text-white' : activeTab !== 'sold'}"
                        href="#"
                        class="group flex items-center px-2 py-2 text-sm font-medium rounded">
                        <i class="fas fa-warehouse"></i></i><h4 class="m-1">Laod</h4>
                    </a>
                    <a @click="activeTab = 'soldhouses'"
                        :class="{ 'bg-gray-900 text-white': activeTab === 'soldhouses', 'text-gray-300 hover:bg-gray-700 hover:text-white' : activeTab !== 'soldhouses'}"
                        href="#"
                        class="group flex items-center px-2 py-2 text-sm font-medium rounded">
                        <i class="fa-solid fa-house"></i></i><h4 class="m-1">Majad</h4>
                    </a>

                    <a @click="activeTab = 'labs'"
                        :class="{ 'bg-gray-900 text-white': activeTab === 'labs', 'text-gray-300 hover:bg-gray-700 hover:text-white' : activeTab !== 'labs'}"
                        href="#"
                        class="group flex items-center px-2 py-2 text-sm font-medium rounded">
                        <i class="fa-solid fa-flask"></i></i><h4 class="m-1">Laborid</h4>
                    </a>

                </div>
              </div>
            </div>
        </div>
      </nav>
    <div id="mainContent" class="h-screen flex overflow-hidden bg-gray-100" style="max-height: 100%;">
        <div class="flex flex-col w-0 flex-1 overflow-hidden">
            <main id="mainElement" class="flex-1 relative z-0 overflow-y-auto focus:outline-none" tabindex="0" x-init="$el.focus()">
                <div class="py-6" x-show="activeTab === 'sold'">
                    <div>
                        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <input type="text" class="shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm border border-gray-100 rounded" style="width: 25.5%" placeholder="Isikukood" id="searchContext">
                            <span class="ml-2 mt-2">
                                <button type="button" class="h-9 inline-flex items-center px-4 py-2 border border-transparent shadow-sm font-medium rounded text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:text-sm" id="search"><i class="fas fa-search"></i></button>
                                <button type="button" class="h-9 inline-flex items-center px-4 py-2 border border-transparent shadow-sm font-medium rounded text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 sm:text-sm" id="new"><i class="fas fa-plus"></i></button>
                            </span>
                        </div>

                        <div class="max-w-7xl mx-auto px-4 sm:px-6 md:px-8">
                            <!-- Replace with your content -->
                            <!-- This example requires Tailwind CSS v2.0+ -->
                            <ul class="divide-y divide-gray-200">
                                <li class="py-4">
                                    <div class="flex flex-col mt-5">
                                        <div class="-my-2 overflow-x-auto sm:-mx-6 lg:-mx-8">
                                            <div class="py-2 align-middle inline-block min-w-full sm:px-6 lg:px-8">
                                                <div class="shadow overflow-hidden border-b border-gray-200 sm:rounded">
                                                    <table class="min-w-full divide-y divide-gray-200">
                                                        <thead class="bg-gray-50">
                                                        <tr>
                                                            <th scope="col"
                                                                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                                                Valdaja
                                                            </th>
                                                            <th scope="col"
                                                                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                                                Asukoht
                                                            </th>
                                                            <th scope="col"
                                                                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                                                Tegevused
                                                            </th>
                                                        </tr>
                                                        </thead>
                                                        <tbody class="bg-white divide-y divide-gray-200" x-data="{items: []}"
                                                            @update-properties-list.window="items = $event.detail.items">
                                                        <template x-for="item in items" :key="item">
                                                            <tr>
                                                                <td class="px-6 py-4 whitespace-nowrap">
                                                                    <div class="flex items-center">
                                                                        <div class="ml-4">
                                                                            <div class="text-sm font-medium text-gray-900" x-text="item.owner">
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                </td>
                                                                <td class="px-6 py-4 whitespace-nowrap">
                                                                    <div class="flex items-center">
                                                                        <div class="ml-4">
                                                                            <div class="text-sm font-medium text-gray-900" x-text="item.location">
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                </td>
                                                                <td class="px-6 py-4 whitespace-nowrap">
                                                                    <button id="markLocation" x-bind:warehouse-id="item.id" href="#" class="inline-flex items-center px-2.5 py-1.5 border border-transparent text-xs font-medium rounded shadow-sm text-white bg-blue-600 hover:bg-blue-700">Märgi kaardil</button>
                                                                </td>
                                                            </tr>
                                                        </template>
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>




                <div class="py-6" x-show="activeTab === 'soldhouses'">
                    <div>
                        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <input type="text" class="shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm border border-gray-100 rounded" style="width: 25.5%" placeholder="Isikukood" id="searchhouseContext">
                            <span class="ml-2 mt-2">
                                <button type="button" class="h-9 inline-flex items-center px-4 py-2 border border-transparent shadow-sm font-medium rounded text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:text-sm" id="searchhouses"><i class="fas fa-search"></i></button>
                                <button type="button" class="h-9 inline-flex items-center px-4 py-2 border border-transparent shadow-sm font-medium rounded text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 sm:text-sm" id="newhouse"><i class="fas fa-plus"></i></button>
                                <button type="button" class="h-9 inline-flex items-center px-4 py-2 border border-transparent shadow-sm font-medium rounded text-white bg-yellow-600 hover:bg-yellow-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-yellow-500 sm:text-sm" id="upgrade"><i class="fa-solid fa-turn-up"></i></button>
                            </span>
                        </div>

                        <div class="max-w-7xl mx-auto px-4 sm:px-6 md:px-8">
                            <!-- Replace with your content -->
                            <!-- This example requires Tailwind CSS v2.0+ -->
                            <ul class="divide-y divide-gray-200">
                                <li class="py-4">
                                    <div class="flex flex-col mt-5">
                                        <div class="-my-2 overflow-x-auto sm:-mx-6 lg:-mx-8">
                                            <div class="py-2 align-middle inline-block min-w-full sm:px-6 lg:px-8">
                                                <div class="shadow overflow-hidden border-b border-gray-200 sm:rounded">
                                                    <table class="min-w-full divide-y divide-gray-200">
                                                        <thead class="bg-gray-50">
                                                        <tr>
                                                            <th scope="col"
                                                                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                                                Valdaja
                                                            </th>
                                                            <th scope="col"
                                                                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                                                Asukoht
                                                            </th>
                                                            <th scope="col"
                                                                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                                                Tegevused
                                                            </th>
                                                        </tr>
                                                        </thead>
                                                        <tbody class="bg-white divide-y divide-gray-200" x-data="{items: []}"
                                                            @update-houses-list.window="items = $event.detail.items">
                                                        <template x-for="item in items" :key="item">
                                                            <tr>
                                                                <td class="px-6 py-4 whitespace-nowrap">
                                                                    <div class="flex items-center">
                                                                        <div class="ml-4">
                                                                            <div class="text-sm font-medium text-gray-900" x-text="item.owner">
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                </td>
                                                                <td class="px-6 py-4 whitespace-nowrap">
                                                                    <div class="flex items-center">
                                                                        <div class="ml-4">
                                                                            <div class="text-sm font-medium text-gray-900" x-text="item.location">
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                </td>
                                                                <td class="px-6 py-4 whitespace-nowrap">
                                                                    <button id="markLocation" x-bind:warehouse-id="item.id" href="#" class="inline-flex items-center px-2.5 py-1.5 border border-transparent text-xs font-medium rounded shadow-sm text-white bg-blue-600 hover:bg-blue-700">Märgi kaardil</button>
                                                                </td>
                                                            </tr>
                                                        </template>
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="py-6" x-show="activeTab === 'labs'">
                    <div>
                        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <input type="text" class="shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500 sm:text-sm border border-gray-100 rounded" style="width: 25.5%" placeholder="Isikukood" id="searchlabsContext">
                            <span class="ml-2 mt-2">
                                <button type="button" class="h-9 inline-flex items-center px-4 py-2 border border-transparent shadow-sm font-medium rounded text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:text-sm" id="searchlabs"><i class="fas fa-search"></i></button>
                                <button type="button" class="h-9 inline-flex items-center px-4 py-2 border border-transparent shadow-sm font-medium rounded text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 sm:text-sm" id="newlab"><i class="fas fa-plus"></i></button>
                            </span>
                        </div>

                        <div class="max-w-7xl mx-auto px-4 sm:px-6 md:px-8">
                            <ul class="divide-y divide-gray-200">
                                <li class="py-4">
                                    <div class="flex flex-col mt-5">
                                        <div class="-my-2 overflow-x-auto sm:-mx-6 lg:-mx-8">
                                            <div class="py-2 align-middle inline-block min-w-full sm:px-6 lg:px-8">
                                                <div class="shadow overflow-hidden border-b border-gray-200 sm:rounded">
                                                    <table class="min-w-full divide-y divide-gray-200">
                                                        <thead class="bg-gray-50">
                                                        <tr>
                                                            <th scope="col"
                                                                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                                                Valdaja
                                                            </th>
                                                            <th scope="col"
                                                                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                                                Nimi
                                                            </th>
                                                            <th scope="col"
                                                                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                                                Kood
                                                            </th>
                                                            <th scope="col"
                                                                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                                                Asukoht
                                                            </th>
                                                            <th scope="col"
                                                                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                                                Tegevused
                                                            </th>
                                                        </tr>
                                                        </thead>
                                                        <tbody class="bg-white divide-y divide-gray-200" x-data="{items: []}"
                                                            @update-labs-list.window="items = $event.detail.items">
                                                        <template x-for="item in items" :key="item">
                                                            <tr>
                                                                <td class="px-6 py-4 whitespace-nowrap">
                                                                    <div class="flex items-center">
                                                                        <div class="ml-4">
                                                                            <div class="text-sm font-medium text-gray-900" x-text="item.owner">
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                </td>
                                                                <td class="px-6 py-4 whitespace-nowrap">
                                                                    <div class="flex items-center">
                                                                        <div class="ml-4">
                                                                            <div class="text-sm font-medium text-gray-900" x-text="item.name">
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                </td>

                                                                <td class="px-6 py-4 whitespace-nowrap">
                                                                    <div class="flex items-center">
                                                                        <div class="ml-4">
                                                                            <div class="text-sm font-medium text-gray-900" x-text="item.password">
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                </td>

                                                                <td class="px-6 py-4 whitespace-nowrap">
                                                                    <div class="flex items-center">
                                                                        <div class="ml-4">
                                                                            <div class="text-sm font-medium text-gray-900" x-text="item.location">
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                </td>
                                                                
                                                                <td class="px-6 py-4 whitespace-nowrap">
                                                                    <button id="markLocationlab" x-bind:lab-id="item.id" href="#" class="inline-flex items-center px-2.5 py-1.5 border border-transparent text-xs font-medium rounded shadow-sm text-white bg-blue-600 hover:bg-blue-700">Märgi kaardil</button>
                                                                </td>
                                                            </tr>
                                                        </template>
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</div>
</div>
</body>
</html>
