<!doctype html>

<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KK PoliceSounds</title>
    
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="script.js" type="text/javascript"></script>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="hidden">
    <div class="flex justify-center select-none"> 
        <div class="absolute top-10 block p-6 rounded-3xl shadow bg-zinc-800 border border-zinc-700 text-zinc-300">
            <button data-id="disperse_now" class="bg-zinc-900 border border-zinc-700 cursor-pointer shadow rounded">

               <img class="h-12 p-1" src="img/disperse_now.png">
            </button>

            <button data-id="get_out_of_here_now" class="bg-zinc-900 border border-zinc-700 cursor-pointer shadow rounded">
                
               <img class="h-12 p-1" src="img/get_out_of_here_now.png">
            </button>

            <button data-id="shoot_to_kill" class="bg-zinc-900 border border-zinc-700 cursor-pointer shadow rounded">

               <img class="h-12 p-1" src="img/shoot_to_kill.png">
            </button>

            <button data-id="stop_dont_move" class="bg-zinc-900 border border-zinc-700 cursor-pointer shadow rounded">

               <img class="h-12 p-1" src="img/stop_dont_move.png">
            </button>

            <button data-id="stop_the_f_car" class="bg-zinc-900 border border-zinc-700 cursor-pointer shadow rounded">

               <img class="h-12 p-1" src="img/stop_the_f_car.png">
            </button>

            <button data-id="stop_vehicle_2" class="bg-zinc-900 border border-zinc-700 cursor-pointer shadow rounded">

               <img class="h-12 p-1" src="img/stop_vehicle_2.png">
            </button>

            <button data-id="this_is_the_lspd" class="bg-zinc-900 border border-zinc-700 cursor-pointer shadow rounded">

               <img class="h-12 p-1" src="img/this_is_the_lspd.png">
            </button>

            <button data-id="you_are_finished_dhead" class="bg-zinc-900 border border-zinc-700 cursor-pointer shadow rounded">

               <img class="h-12 p-1" src="img/you_are_finished_dhead.png">
            </button>
        </div>
    </div>
</body>
</html>
