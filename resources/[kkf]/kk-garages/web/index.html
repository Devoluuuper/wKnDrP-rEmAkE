<!DOCTYPE html>
<html lang="en" class="select-none scroll-smooth focus:outline-none tap-highlight-transparent overflow-x-hidden">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="nui://kk-core/web/cdn/alpine.min.js"></script>

    <script src="script.js"></script>

    <title>Kasutaja Garages</title>

    <style>
        /* width */
        ::-webkit-scrollbar {
            width: 10px;
        }

        /* Track */
        ::-webkit-scrollbar-track {
            background: #3F3F46;
        }

        /* Handle */
        ::-webkit-scrollbar-thumb {
            background: #1e1e1f ;
        }

        /* Handle on hover */
        ::-webkit-scrollbar-thumb:hover {
            background: #141414;
        }
    </style>
</head>
<body 
    class="text-white"
    x-data="garage"
    x-init="init()"
    @keydown.window="handleKeydown($event)"
>
    <div id="maincontainer" x-show="showMenu" class="absolute w-full h-full flex justify-end gap-4 overflow-y-hidden" x-transition>
        <div class="absolute flex-col p-4 gap-4 w-[60vh] h-full">
            <div class="bg-zinc-900 shadow border border-zinc-700 rounded p-4 w-full max-h-[28%] overflow-y-auto mb-4" x-transition>
                <div class="flex justify-between items-center mb-4">
                    <h2 x-text="garageName" class="text-xl font-bold"></h2>
                    <p class="text-sm text-zinc-400">Sõidukite limiit <span x-text="limits"></span></p>
                </div>

                <input x-model="vehicleSearch" type="text" placeholder="Otsi..." class="border shadow border-zinc-700 bg-zinc-800 text-white rounded p-2 w-full mb-4 focus:outline-none focus:ring focus:ring-sky-300">

                <div class="grid grid-cols-2 gap-4">
                    <template x-for="(value, index) in filteredVehicles" :key="index">
                        <div class="text-center bg-zinc-800 shadow border border-zinc-700 rounded p-4">
                            <svg @click="currentTab = value; vehicleSelected = ''" class="w-8 h-8 cursor-pointer mx-auto mb-2 text-white hover:text-sky-500 focus:outline-none focus:ring focus:ring-sky-300" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 8.25H7.5a2.25 2.25 0 0 0-2.25 2.25v9a2.25 2.25 0 0 0 2.25 2.25h9a2.25 2.25 0 0 0 2.25-2.25v-9a2.25 2.25 0 0 0-2.25-2.25H15M9 12l3 3m0 0 3-3m-3 3V2.25" />
                            </svg>

                            <h3 x-text="value" class="text-lg font-bold"></h3>
                            <p class="text-gray-400">Lehel on kokku <span x-text="arrayCounter(tabs[value])"></span> autot</p>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="currentTab != ''" class="bg-zinc-900 shadow border border-zinc-700 rounded p-4 w-full max-h-[45%] overflow-y-auto mb-4" x-transition>
                <div class="flex justify-between items-center mb-4">
                    <h2 x-text="currentTab" class="text-xl font-bold"></h2>
                    <p class="text-sm text-zinc-400">Kokku on lehel <span x-text="arrayCounter(tabs[currentTab])"></span> sõiduk</p>
                </div>

                <input x-model="tabSearch" type="text" placeholder="Otsi..." class="border shadow border-zinc-700 bg-zinc-800 text-white rounded p-2 w-full mb-4 focus:outline-none focus:ring focus:ring-sky-300">

                <div class="grid grid-cols-2 gap-4">
                    <template x-for="(value, index) in filteredTabVehicles" :key="index">
                        <div class="text-center bg-zinc-800 shadow border border-zinc-700 rounded p-4">
                            <svg @click="selectVehicle(index)" class="w-8 h-8 cursor-pointer mx-auto mb-4 text-white hover:text-sky-500 focus:outline-none focus:ring focus:ring-sky-300" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 8.25H7.5a2.25 2.25 0 0 0-2.25 2.25v9a2.25 2.25 0 0 0 2.25 2.25h9a2.25 2.25 0 0 0 2.25-2.25v-9a2.25 2.25 0 0 0-2.25-2.25H15M9 12l3 3m0 0 3-3m-3 3V2.25" />
                            </svg>

                            <h3 x-text="value.title" class="text-lg font-bold"></h3>

                            <p class="text-gray-400 mb-4" x-show="menuType === 'impound'">$<span x-text="value.price"></span></p>
                            <p class="text-gray-400 mb-4" x-show="menuType === 'garage'">Kere: <span x-text="value.body"></span> | Mootor: <span x-text="value.engine"></span> | Kütus: <span x-text="value.fuel"></span></p>

                            <div class="relative inline-block">
                                <img src="plate.png" alt="License plate" class="w-auto h-12 shadow">

                                <div class="absolute inset-0 flex items-center justify-center">
                                    <span x-text="value.plate" class="text-xl font-bold text-sky-800"></span>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="vehicleSelected != ''" class="bg-zinc-900 shadow border border-zinc-700 rounded p-4 h-min w-full max-h-[24%] mb-4" x-transition>
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold">Detailid</h2>
                    <p x-text="vehicleSelected" class="text-zinc-400"></p>
                </div>

                <button @click="spawnVehicle(vehicleSelected)" class="bg-sky-500 hover:bg-sky-600 focus:outline-none focus:ring focus:ring-sky-300 text-white font-bold py-2 px-4 rounded w-full mb-4">
                    Väljasta
                </button>

                <div class="space-y-2">
                    <button @click="toggleKeyModal(true)" class="bg-zinc-800 hover:bg-zinc-700 focus:outline-none focus:ring focus:ring-sky-300 text-white font-bold py-2 px-4 rounded w-full">
                        Uus võti
                    </button> 

                    <button @click="toggleNameModal(true)" class="bg-zinc-800 hover:bg-zinc-700 focus:outline-none focus:ring focus:ring-sky-300 text-white font-bold py-2 px-4 rounded w-full">
                        Muuda nimetust
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Change Name Modal -->
    <div class="relative z-10" aria-labelledby="modal-title" role="dialog" aria-modal="true" x-show="changeName" @click.away="toggleNameModal(false)">
        <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true"></div>
    
        <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
            <div class="flex min-h-full items-center justify-center p-4 text-center sm:p-0">
                <div class="relative transform overflow-hidden rounded bg-zinc-900 border border-zinc-700 px-4 pb-4 pt-5 text-left shadow-xl transition-all w-[60vh] sm:my-8 sm:w-[50vh] sm:p-6">
                    <div class="sm:flex sm:items-start">
                        <div class="mx-auto flex h-12 w-12 flex-shrink-0 items-center justify-center rounded-full bg-zinc-100 sm:mx-0 sm:h-10 sm:w-10">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-6 w-6 text-zinc-600">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15 9h3.75M15 12h3.75M15 15h3.75M4.5 19.5h15a2.25 2.25 0 0 0 2.25-2.25V6.75A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25v10.5A2.25 2.25 0 0 0 4.5 19.5Zm6-10.125a1.875 1.875 0 1 1-3.75 0 1.875 1.875 0 0 1 3.75 0Zm1.294 6.336a6.721 6.721 0 0 1-3.17.789 6.721 6.721 0 0 1-3.168-.789 3.376 3.376 0 0 1 6.338 0Z" />
                            </svg>
                        </div>
    
                        <div class="mt-3 text-center sm:ml-4 sm:mt-0 sm:text-left w-full">
                            <h3 class="text-base font-semibold leading-6 text-white" id="modal-title">Nimetuse muutmine</h3>
                            <div class="mt-2">
                                <input x-model="vehicleName" maxlength="20" class="block w-full rounded border border-zinc-700 bg-zinc-800 py-2 px-2 text-white shadow-sm placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-sky-500 sm:text-sm sm:leading-6" placeholder="Uus nimetus" aria-label="Uus nimetus">
                            </div>
                        </div>
                    </div>
    
                    <div class="mt-5 sm:mt-4 sm:flex sm:flex-row-reverse">
                        <button type="button" @click="changeVehicleName()" class="inline-flex w-full justify-center rounded bg-sky-500 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-sky-600 focus:outline-none focus:ring-2 focus:ring-sky-500 sm:ml-3 sm:w-auto">Kinnita</button>
                        <button @click="toggleNameModal(false)" type="button" class="mt-3 inline-flex w-full justify-center rounded bg-zinc-800 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-zinc-700 focus:outline-none focus:ring-2 focus:ring-sky-500 sm:mt-0 sm:w-auto">Katkesta</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Key Modal -->
    <div class="relative z-10" aria-labelledby="modal-title" role="dialog" aria-modal="true" x-show="keyModal" @click.away="toggleKeyModal(false)">
        <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true"></div>
    
        <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
            <div class="flex min-h-full items-center justify-center p-4 text-center sm:p-0">
                <div class="relative transform overflow-hidden rounded bg-zinc-900 border border-zinc-700 px-4 pb-4 pt-5 text-left shadow-xl transition-all w-[60vh] sm:my-8 sm:w-[50vh] sm:p-6">
                    <div class="sm:flex sm:items-start">                          
                        <div class="mx-auto flex h-12 w-12 flex-shrink-0 items-center justify-center rounded-full bg-zinc-100 sm:mx-0 sm:h-10 sm:w-10">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="h-6 w-6 text-zinc-600">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 0 1 3 3m3 0a6 6 0 0 1-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1 1 21.75 8.25Z" />
                            </svg>
                        </div>
    
                        <div class="mt-3 text-center sm:ml-4 sm:mt-0 sm:text-left w-full">
                            <h3 class="text-base font-semibold leading-6 text-white" id="modal-title">Võtme soetamine</h3>
                            <div class="mt-2">
                                <p class="text-white">Uue võtme hind on $<span x-text="keyPrice"></span></p>
                            </div>
                        </div>
                    </div>
    
                    <div class="mt-5 sm:mt-4 sm:flex sm:flex-row-reverse">
                        <button type="button" @click="buyKey()" class="inline-flex w-full justify-center rounded bg-sky-500 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-sky-600 focus:outline-none focus:ring-2 focus:ring-sky-500 sm:ml-3 sm:w-auto">Soeta</button>
                        <button @click="toggleKeyModal(false)" type="button" class="mt-3 inline-flex w-full justify-center rounded bg-zinc-800 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-zinc-700 focus:outline-none focus:ring-2 focus:ring-sky-500 sm:mt-0 sm:w-auto">Katkesta</button>
                    </div>
                </div>
            </div>
        </div>
    </div>    
</body>
</html>
