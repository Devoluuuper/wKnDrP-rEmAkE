<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="style.css" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="nui://kk-core/web/cdn/alpine.min.js"></script>

    <script src="script.js"></script>

    <title>Kasutaja Emotes</title>

    <style>
        /* width */
        ::-webkit-scrollbar {
            width: 10px;
        }

        /* Track */
        ::-webkit-scrollbar-track {
            background: #1E1E1E;
        }

        /* Handle */
        ::-webkit-scrollbar-thumb {
            background: #3F3F46;
        }

        /* Handle on hover */
        ::-webkit-scrollbar-thumb:hover {
            background: #52525B;
        }

        /* Chrome, Safari, Edge, Opera */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Firefox */
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body 
    x-data="emotes"
    x-init="init()"
    @keydown.window="handleKeydown"
    x-show="open"
>
    <div 
        style="position: absolute; margin: 0 auto; left: 50%; transform: translate(-50%, -50%); top: 48vh; width:85rem;height:55rem"
        class="bg-zinc-800/80 text-white font-sans rounded shadow"
    >
        <div class="h-full w-full px-6 py-4 overflow-hidden flex">
            <!-- Sidebar -->
            <div class="flex flex-col justify-between w-1/5 bg-zinc-900/80 p-4 rounded shadow mr-6">
                <ul class="space-y-2">
                    <li>
                        <button 
                            class="flex items-center gap-2 w-full p-2 text-left bg-zinc-700/80 rounded text-white border border-zinc-700"
                            :class="{
                                'border-sky-500 text-sky-500': currentPage === 'home',
                                'border-zinc-700 hover:border-sky-500 hover:text-sky-500': currentPage != 'home',
                            }"
                            @click="changePage('home')"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                                <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
                            </svg>
                            <div class="flex flex-col">
                                <p>Kõik</p>
                                <span class="text-xs"><span x-text="pageCount('home')"></span> animatsiooni</span>
                            </div>
                        </button>
                    </li>
                    <li>
                        <button 
                            class="flex items-center gap-2 w-full p-2 text-left bg-zinc-700/80 rounded text-white border border-zinc-700"
                            :class="{
                                'border-sky-500 text-sky-500': currentPage === 'dances',
                                'border-zinc-700 hover:border-sky-500 hover:text-sky-500': currentPage != 'dances',
                            }"
                            @click="changePage('dances')"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                            </svg>
                            <div class="flex flex-col">
                                <p>Tantsud</p>
                                <span class="text-xs"><span x-text="pageCount('dances')"></span> animatsiooni</span>
                            </div>
                        </button>
                    </li>
                    <li>
                        <button 
                            class="flex items-center gap-2 w-full p-2 text-left bg-zinc-700/80 rounded text-white border border-zinc-700"
                            :class="{
                                'border-sky-500 text-sky-500': currentPage === 'scenarios',
                                'border-zinc-700 hover:border-sky-500 hover:text-sky-500': currentPage != 'scenarios',
                            }"
                            @click="changePage('scenarios')"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09ZM18.259 8.715 18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 0 0 2.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 0 0-2.456 2.456ZM16.894 20.567 16.5 21.75l-.394-1.183a2.25 2.25 0 0 0-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 0 0 1.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 0 0 1.423 1.423l1.183.394-1.183.394a2.25 2.25 0 0 0-1.423 1.423Z" />
                            </svg>
                            <div class="flex flex-col">
                                <p>Stsenaariumid</p>
                                <span class="text-xs"><span x-text="pageCount('scenarios')"></span> animatsiooni</span>
                            </div>
                        </button>
                    </li>
                    <li>
                        <button 
                            class="flex items-center gap-2 w-full p-2 text-left bg-zinc-700/80 rounded text-white border border-zinc-700"
                            :class="{
                                'border-sky-500 text-sky-500': currentPage === 'walks',
                                'border-zinc-700 hover:border-sky-500 hover:text-sky-500': currentPage != 'walks',
                            }"
                            @click="changePage('walks')"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15.182 15.182a4.5 4.5 0 0 1-6.364 0M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0ZM9.75 9.75c0 .414-.168.75-.375.75S9 10.164 9 9.75 9.168 9 9.375 9s.375.336.375.75Zm-.375 0h.008v.015h-.008V9.75Zm5.625 0c0 .414-.168.75-.375.75s-.375-.336-.375-.75.168-.75.375-.75.375.336.375.75Zm-.375 0h.008v.015h-.008V9.75Z" />
                            </svg>
                            <div class="flex flex-col">
                                <p>Kõnnakud</p>
                                <span class="text-xs"><span x-text="pageCount('walks')"></span> animatsiooni</span>
                            </div>
                        </button>
                    </li>
                    <li>
                        <button 
                            class="flex items-center gap-2 w-full p-2 text-left bg-zinc-700/80 rounded text-white border border-zinc-700"
                            :class="{
                                'border-sky-500 text-sky-500': currentPage === 'props',
                                'border-zinc-700 hover:border-sky-500 hover:text-sky-500': currentPage != 'props',
                            }"
                            @click="changePage('props')"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 6.75V15m6-6v8.25m.503 3.498 4.875-2.437c.381-.19.622-.58.622-1.006V4.82c0-.836-.88-1.38-1.628-1.006l-3.869 1.934c-.317.159-.69.159-1.006 0L9.503 3.252a1.125 1.125 0 0 0-1.006 0L3.622 5.689C3.24 5.88 3 6.27 3 6.695V19.18c0 .836.88 1.38 1.628 1.006l3.869-1.934c.317-.159.69-.159 1.006 0l4.994 2.497c.317.158.69.158 1.006 0Z" />
                            </svg>
                            <div class="flex flex-col">
                                <p>Objektid</p>
                                <span class="text-xs"><span x-text="pageCount('props')"></span> animatsiooni</span>
                            </div>
                        </button>
                    </li>
                    <li>
                        <button 
                            class="flex items-center gap-2 w-full p-2 text-left bg-zinc-700/80 rounded text-white border border-zinc-700"
                            :class="{
                                'border-sky-500 text-sky-500': currentPage === 'expressions',
                                'border-zinc-700 hover:border-sky-500 hover:text-sky-500': currentPage != 'expressions',
                            }"
                            @click="changePage('expressions')"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 6.75V15m6-6v8.25m.503 3.498 4.875-2.437c.381-.19.622-.58.622-1.006V4.82c0-.836-.88-1.38-1.628-1.006l-3.869 1.934c-.317.159-.69.159-1.006 0L9.503 3.252a1.125 1.125 0 0 0-1.006 0L3.622 5.689C3.24 5.88 3 6.27 3 6.695V19.18c0 .836.88 1.38 1.628 1.006l3.869-1.934c.317-.159.69-.159 1.006 0l4.994 2.497c.317.158.69.158 1.006 0Z" />
                            </svg>
                            <div class="flex flex-col">
                                <p>Näoilmed</p>
                                <span class="text-xs"><span x-text="pageCount('expressions')"></span> animatsiooni</span>
                            </div>
                        </button>
                    </li>
                    <li>
                        <button 
                            class="flex items-center gap-2 w-full p-2 text-left bg-zinc-700/80 rounded text-white border border-zinc-700"
                            :class="{
                                'border-sky-500 text-sky-500': currentPage === 'shared',
                                'border-zinc-700 hover:border-sky-500 hover:text-sky-500': currentPage != 'shared',
                            }"
                            @click="changePage('shared')"
                        >
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M9 6.75V15m6-6v8.25m.503 3.498 4.875-2.437c.381-.19.622-.58.622-1.006V4.82c0-.836-.88-1.38-1.628-1.006l-3.869 1.934c-.317.159-.69.159-1.006 0L9.503 3.252a1.125 1.125 0 0 0-1.006 0L3.622 5.689C3.24 5.88 3 6.27 3 6.695V19.18c0 .836.88 1.38 1.628 1.006l3.869-1.934c.317-.159.69-.159 1.006 0l4.994 2.497c.317.158.69.158 1.006 0Z" />
                            </svg>
                            <div class="flex flex-col">
                                <p>Jagatud</p>
                                <span class="text-xs"><span x-text="pageCount('shared')"></span> animatsiooni</span>
                            </div>
                        </button>
                    </li>
                </ul>

                <div class="flex flex-col justify-center items-center gap-2">
                    <div 
                        x-show="labelText" 
                        x-text="labelText" 
                        class="text-md"
                    ></div>

                    <ul class="flex gap-2 justify-center">
                        <li @mouseenter="labelText = 'Loopimine'" @mouseleave="labelText = false">
                            <button 
                                class="flex items-center gap-2 w-full p-2 text-left bg-zinc-700/80 rounded text-white border border-zinc-700"
                                @click="optionToggle('loop')"
                                :class="{
                                    'border-sky-500 text-sky-500': loop,
                                    'border-zinc-700 hover:border-sky-500 hover:text-sky-500': !loop,
                                }"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
                                </svg>
                            </button>
                        </li>
                        <li @mouseenter="labelText = 'Liikumine'" @mouseleave="labelText = false">
                            
                            <button 
                                class="flex items-center gap-2 w-full p-2 text-left bg-zinc-700/80 rounded text-white border border-zinc-700"
                                @click="optionToggle('move')"
                                :class="{
                                    'border-sky-500 text-sky-500': move,
                                    'border-zinc-700 hover:border-sky-500 hover:text-sky-500': !move,
                                }"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15" />
                                </svg>
                            </button>
                        </li>
                        <li @mouseenter="labelText = 'Paigutamine'" @mouseleave="labelText = false">
                            <button 
                                class="flex items-center gap-2 w-full p-2 text-left bg-zinc-700/80 rounded text-white border border-zinc-700"
                                @click="optionToggle('place')"
                                :class="{
                                    'border-sky-500 text-sky-500': place,
                                    'border-zinc-700 hover:border-sky-500 hover:text-sky-500': !place,
                                }"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M9.53 16.122a3 3 0 0 0-5.78 1.128 2.25 2.25 0 0 1-2.4 2.245 4.5 4.5 0 0 0 8.4-2.245c0-.399-.078-.78-.22-1.128Zm0 0a15.998 15.998 0 0 0 3.388-1.62m-5.043-.025a15.994 15.994 0 0 1 1.622-3.395m3.42 3.42a15.995 15.995 0 0 0 4.764-4.648l3.876-5.814a1.151 1.151 0 0 0-1.597-1.597L14.146 6.32a15.996 15.996 0 0 0-4.649 4.763m3.42 3.42a6.776 6.776 0 0 0-3.42-3.42" />
                                </svg>
                            </button>
                        </li>
                        <li @mouseenter="labelText = 'Katkestamine'" @mouseleave="labelText = false">
                            <button 
                                class="flex items-center gap-2 w-full p-2 text-left bg-zinc-700/80 hover:bg-zinc-600 rounded text-white border border-zinc-700"
                                @click="cancelAnimation()"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 7.5V18M15 7.5V18M3 16.811V8.69c0-.864.933-1.406 1.683-.977l7.108 4.061a1.125 1.125 0 0 1 0 1.954l-7.108 4.061A1.125 1.125 0 0 1 3 16.811Z" />
                                </svg>                              
                            </button>
                        </li>
                        <li @mouseenter="labelText = 'Objektide kustutamine'" @mouseleave="labelText = false">
                            
                            <button 
                                class="flex items-center gap-2 w-full p-2 text-left bg-zinc-700/80 hover:bg-zinc-600 rounded text-white border border-zinc-700"
                                @click="deleteObjects()"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="m20.25 7.5-.625 10.632a2.25 2.25 0 0 1-2.247 2.118H6.622a2.25 2.25 0 0 1-2.247-2.118L3.75 7.5m6 4.125 2.25 2.25m0 0 2.25 2.25M12 13.875l2.25-2.25M12 13.875l-2.25 2.25M3.375 7.5h17.25c.621 0 1.125-.504 1.125-1.125v-1.5c0-.621-.504-1.125-1.125-1.125H3.375c-.621 0-1.125.504-1.125 1.125v1.5c0 .621.504 1.125 1.125 1.125Z" />
                                </svg>
                            </button>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- Main Content Area -->
            <div class="flex-1 flex flex-col gap-6">
                <!-- Header -->
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-3xl font-semibold">Animatsioonid</h1>
                    
                    <div class="flex items-center gap-4">
                        <!-- Search Bar -->
                        <input 
                            type="text" 
                            x-model="search"
                            placeholder="Otsi animatsioone..." 
                            class="w-96 bg-zinc-900/80 text-white text-sm p-2 rounded border border-zinc-700 focus:outline-none focus:ring-2 focus:ring-zinc-600" 
                            aria-label="Otsi animatsioone"
                            @input.debounce.500ms="emoteSearch"
                        >

                        <!-- Close Menu Button -->
                        <button 
                            @click="closeMenu()" 
                            class="flex bg-zinc-900/80 text-sm p-2 rounded border border-zinc-700 shadow hover:bg-zinc-800 transition"
                            aria-label="Sulge Menu"
                        >
                            Sulge
                        </button>
                    </div>
                </div>

                <!-- Animations Grid -->
                <div class="flex-1 rounded overflow-y-auto">
                    <div class="grid grid-cols-5 gap-4 p-4">
                        <!-- Repeat these blocks for each animation -->
                        <template x-for="(value, index) in emoteSearch" :key="index">
                            <div class="flex flex-col items-center gap-2 justify-between bg-zinc-900/80 px-3 py-2 rounded shadow">
                                <div class="w-full flex justify-between items-center">
                                    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" 
                                        class="size-6 hover:cursor-pointer"
                                        @click="optionToggle('favorites', value.title)"
                                        :class="{
                                            'text-zinc-500': !isFavorite(value.title),
                                            'text-yellow-500': isFavorite(value.title)
                                        }"                                        
                                    >
                                        <path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z" />
                                    </svg>
                                      
                                    <div x-text="value.subtitle" class="text-xs bg-sky-500 px-2 py-1 rounded shadow"></div>
                                </div>
    
                                <img 
                                    class="size-28 text-center hover:cursor-pointer" 
                                    :src="value.image ? value.image : 'img/placeholder.png'"
                                    @click="playAnimation(value.title)"
                                >
    
                                <div 
                                    x-text="value.title" 
                                    class="text-center"
                                    @click="playAnimation(value.title)"
                                ></div>
                            </div>
                        </template>
                    </div>
                </div>
                
                <!-- Favorites or Other Sections -->
                <div class="bg-zinc-900/80 p-4 rounded shadow h-2/6">
                    <div class="h-full w-full flex-1 rounded overflow-y-auto">
                        <div class="grid grid-cols-5 gap-4 p-4">
                            <template x-for="(value, index) in getFavorites" :key="index">
                                <div class="flex flex-col items-center gap-2 justify-between bg-zinc-900/80 px-3 py-2 rounded shadow">
                                    <div class="w-full flex justify-between items-center">
                                        <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" 
                                            class="size-6 hover:cursor-pointer"
                                            @click="optionToggle('favorites', value.title)"
                                            :class="{
                                                'text-zinc-500': !isFavorite(value.title),
                                                'text-yellow-500': isFavorite(value.title)
                                            }"                                        
                                        >
                                            <path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z" />
                                        </svg>
                                            
                                        <div x-text="value.subtitle" class="text-xs bg-sky-500 px-2 py-1 rounded shadow"></div>
                                    </div>
        
                                    <img 
                                        class="size-28 text-center hover:cursor-pointer" 
                                        :src="value.image ? value.image : 'img/placeholder.png'"
                                        @click="playAnimation(value.title)"
                                    >
        
                                    <div 
                                        x-text="value.title" 
                                        class="text-center"
                                        @click="playAnimation(value.title)"
                                    ></div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
