<html>
	<head>
		<link rel="stylesheet" href="css/app.css" />
        <script src="https://cdn.tailwindcss.com"></script>

        <style>
            ::-webkit-calendar-picker-indicator {
                filter: invert(1);
            }           
        </style>
	</head>
	<body>
        <div id="main-container" class="hidden mt-40 w-3/12 m-auto overflow-hidden">
            <div class="p-6 w-full rounded border bg-gray-800 border-1 border-gray-700">
                <h3 class="mb-1 text-xl font-medium text-gray-200 text-center">Karakteri loomine</h3>
                <h2 class="mb-2 text-xs font-medium text-gray-200 text-center">Sisesta vajalik teave karakteri loomiseks.</h2>

                <div class="text-center text-gray-200">
                    <input id="firstname" class="text-sm rounded block w-full p-2.5 bg-gray-900 border bg-gray-900 rounded border-1 border-gray-700 placeholder-gray-400 text-white" type="text" placeholder="Sisesta eesnimi"><br>
                    <input id="lastname" class="text-sm rounded block w-full p-2.5 bg-gray-900 border bg-gray-900 rounded border-1 border-gray-700 placeholder-gray-400 text-white" type="text" placeholder="Sisesta perekonnanimi"><br>
                    <input min="1900-01-01" max="2022-08-07" id="dateofbirth" value="yyyy-MM-dd" class="text-sm rounded block w-full p-2.5 bg-gray-900 border bg-gray-900 rounded border-1 border-gray-700 placeholder-gray-400 text-white" type="date"><br>

                    <div class="sex-choosing">
                        <input type="radio" name="sex" value="m" checked>
                        <label for="age1" id="test1">Mees</label>   
                        <span class="radio-btn">
                        <input type="radio" name="sex" value="f">
                        <label for="age1" id="test2">Naine</label>
                    </div>

                    <button onclick="KKF.registerCharacter()" class="w-full inline-block text-center select-none font-normal whitespace-no-wrap rounded p-2 mt-1 leading-normal no-underline text-gray-200 border-gray-900 hover:bg-gray-800 hover:text-white bg-indigo-800 hover:bg-indigo-900">Kinnita</button>
                </div>
            </div>
        </div>

		<script src="nui://game/ui/jquery.js" type="text/javascript"></script>
		<script src="app.js"></script>
	</body>
</html>
