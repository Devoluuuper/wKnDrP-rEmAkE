<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	
	<title>KK Boosting</title>

	<!-- <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet"> -->
	<script src="https://cdn.tailwindcss.com"></script>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.2/css/all.min.css"/>

	<script src="nui://game/ui/jquery.js" type="text/javascript"></script>
	<script src="script.js"></script>

	<style>
		::-webkit-scrollbar {
			display: none;
		}

		.lds-dual-ring {
			position: absolute;
			display: hidden;
			width: 80px;
			height: 80px;
		}

		.lds-dual-ring:after {
			content: " ";
			display: block;
			width: 24px;
			height: 24px;
			margin: 8px;
			border-radius: 50%;
			border: 3px solid #E5E7EB;
			border-color: #E5E7EB transparent #E5E7EB transparent;
			animation: lds-dual-ring 1.2s linear infinite;
		}

		@keyframes lds-dual-ring {
			0% {
				transform: rotate(0deg);
			}
			100% {
				transform: rotate(360deg);
			}
		}

	</style>
</head>

<body id="tablet" class="absolute hidden overflow-hidden" style="margin: 0 auto; left:1.8vh; right: 0; top: 7vh; width: 80rem">
	<img src="nui://kk-core/web/cdn/frame.png" style="pointer-events: none; position: fixed; margin: 0 auto; left: 1rem; right: 0; top: 4.2vh; width: 82rem; height: 50rem; z-index: 9999;">

	<div class="mx-auto sm:px-4 max-w-full mx-auto sm:px-4">
		<div class="relative flex flex-col min-w-0 rounded break-words bg-gray-800 text-gray-200 p-2" style="height:750px">
			<header class="p-2 flex justify-between">
				<div></div>

				<div id="loadBar" class="lds-dual-ring"></div>

				<div id='queueToggle' class="w-44 uppercase font-medium text-sm align-middle text-center select-none font-normal whitespace-no-wrap rounded py-1.5 px-2 leading-normal no-underline text-gray-200 border-gray-900 hover:bg-gray-800 hover:text-white bg-green-700 hover:bg-green-800 mt-1">Liitu järjekorraga</div>
			</header>

			<div class="flex p-6 py-2">
				<span class="text-small" id="currentClass">C</span>

				<div class="w-full rounded h-1 bg-gray-700 m-2.5">
					<div id="classProgress" class="h-1 rounded" style="background-image: linear-gradient(to right, #DD557D, #93949B, #3DE6C4)"></div>
				</div>
				
				<span class="text-small" id="nextClass">B</span>
			</div>

			<h5 id="noContracts" class="hidden text-center text-2xl">Teil ei ole ühtegi tööotsa!</h5>

			<div id="contracts" class="overflow-auto" style="height: 610px"></div>
		</div>
	</div>
</body>
</html>
