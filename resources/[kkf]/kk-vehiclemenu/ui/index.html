<!doctype html>

<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KK Vehiclemenu</title>
    
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="script.js" type="text/javascript"></script>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="hidden">
    <div class="flex justify-center select-none"> 
        <div class="absolute bottom-36 block p-6 rounded-3xl shadow bg-zinc-800 border border-zinc-700">
            <button data-id="ignition" class="bg-zinc-900 border border-zinc-700 cursor-pointer shadow rounded"><img class="h-12" src="img/ignition.png"></button>
            <button class="cursor-default"><img class="h-12" src="img/empty.png"></button>
            <button data-id="frontHood" class="bg-zinc-900 border border-zinc-700 cursor-pointer shadow rounded"><img class="h-12" src="img/frontHood.png"></button>
            <button data-id="rearHood" class="bg-zinc-900 border border-zinc-700 cursor-pointer shadow rounded"><img class="h-12" src="img/rearHood.png"></button>
            <button data-id="rearHood2" class="bg-zinc-900 border border-zinc-700 cursor-pointer shadow rounded"><img class="h-12" src="img/rearHood2.png"></button>
            <button data-id="interiorLight" class="bg-zinc-900 border border-zinc-700 cursor-pointer shadow rounded"><img class="h-12" src="img/interiorLight.png"></button><br>

            <button data-id="windowFrontLeft" class="bg-zinc-900 border border-zinc-700 cursor-pointer shadow rounded"><img class="h-12" src="img/windowFrontLeft.png"></button>
            <button data-id="doorFrontLeft" class="bg-zinc-900 border border-zinc-700 cursor-pointer shadow rounded"><img class="h-12" src="img/doorFrontLeft.png"></button>
            <button data-id="seatFrontLeft" class="bg-zinc-900 border border-zinc-700 cursor-pointer shadow rounded"><img class="h-12" src="img/seat.png"></button>
            <button data-id="seatFrontRight" class="bg-zinc-900 border border-zinc-700 cursor-pointer shadow rounded"><img class="h-12" src="img/seat.png"></button>
            <button data-id="doorFrontRight" class="bg-zinc-900 border border-zinc-700 cursor-pointer shadow rounded"><img class="h-12" src="img/doorFrontRight.png"></button>
            <button data-id="windowFrontRight" class="bg-zinc-900 border border-zinc-700 cursor-pointer shadow rounded"><img class="h-12" src="img/windowFrontRight.png"></button><br>

            <button data-id="windowRearLeft" class="bg-zinc-900 border border-zinc-700 cursor-pointer shadow rounded"><img class="h-12" src="img/windowRearLeft.png"></button>
            <button data-id="doorRearLeft" class="bg-zinc-900 border border-zinc-700 cursor-pointer shadow rounded"><img class="h-12" src="img/doorRearLeft.png"></button>
            <button data-id="seatRearLeft" class="bg-zinc-900 border border-zinc-700 cursor-pointer shadow rounded"><img class="h-12" src="img/seat.png"></button>
            <button data-id="seatRearRight" class="bg-zinc-900 border border-zinc-700 cursor-pointer shadow rounded"><img class="h-12" src="img/seat.png"></button>
            <button data-id="doorRearRight" class="bg-zinc-900 border border-zinc-700 cursor-pointer shadow rounded"><img class="h-12" src="img/doorRearRight.png"></button>
            <button data-id="windowRearRight" class="bg-zinc-900 border border-zinc-700 cursor-pointer shadow rounded"><img class="h-12" src="img/windowRearRight.png"></button>
        </div>
    </div>
</body>
</html>
