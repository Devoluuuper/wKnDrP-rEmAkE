<!DOCTYPE html>
<html>
<head>
    <script src="nui://kk-core/web/cdn/jquery.min.js"></script>
    <script src="main.js" type="text/javascript"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        ::-webkit-scrollbar {
            display: none;
        }

        select:focus, textarea:focus, input:focus{
            outline: none;
        }

        /* Chrome, Safari, Edge, Opera */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Firefox */
        input[type=number] {
            -moz-appearance: textfield;
        }

        @font-face {
            font-family: 'retro_gaming0';
            src: url('vhs.ttf');
        }

        #container {
            font-family: 'retro_gaming0';
        }
    </style>
</head>

<body>
    <div id="radar_container" class="hidden absolute top-[50%] right-5" style="transform: translateY(-50%);">
        <div class="w-72 bg-zinc-900 p-2 rounded border shadow border-1 border-zinc-700 text-zinc-200">
            <ul class="flex flex-col">
                <li class="relative block py-2 px-4 border-b border-zinc-700">
                    <b>Kiirus:</b> <p id="radar_speed" class="float-right">XXX mph</p>
                </li>

                <li class="relative block py-2 px-4 border-b border-zinc-700">
                    <b>Vahemaa:</b> <p id="radar_distance" class="float-right">XXX ft</p>
                </li>

                <li class="relative block py-2 px-4">
                    <b>REG.NR:</b> <p id="radar_plate" class="float-right">XXXXXXX</p>
                </li>
            </ul>
        </div>
    </div>

    <div id="image_container" class="hidden">
        <div id="image_box" class="absolute z-1">
            <div id="image" class="relative top-5 left-5 border-8 rounded border-sky-500 w-60 h-72"></div>
        </div>
        
        <button id="doScreenshot" type="button" class="absolute right-2 bottom-2 text-white bg-sky-500 hover:bg-sky-600 font-medium rounded text-sm inline-flex items-center px-5 py-2.5 text-center mr-2">Tee pilti</button>
    </div>

    <div id="container" class="hidden absolute right-5 top-5">
        <div class="p-2 rounded shadow bg-black bg-opacity-70 flex gap-1">
            <div class="text-white mt-auto mb-auto">
                <p id="department" class="text-center">San Andreas State Police</p>
                <p class="text-center"><span id="rank">Peadirektor</span> - <span id="name">Tom Liim</span></p>
                <p id="time" class="text-sm text-center">01/01/2022 20:55:48</p>
            </div>

            <img class="h-16 w-16 mt-auto mb-auto" src="img/axon.png">
        </div>
    </div>

    <div 
        id="candidation_document" 
        class="hidden absolute w-2/6 bg-zinc-800 text-zinc-200 shadow p-2"
        style="margin: 0 auto; margin-top: 5%; left: 50%; top: 20%; transform: translate(-50%, -50%);"
    >
        <div id="header" class="flex justify-center mb-4">
            <p class="text-xl font-medium uppercase">Kandideerimisavaldus</p>
        </div>

        <div class="flex gap-1 mb-1">
            <div class="w-1/2">
                <div id="name" class="mb-1">
                    <label for="category" class="text-sm font-medium">Nimi:</label>
                    <input id="myName" value="" class="bg-zinc-900 border border-zinc-700 shadow text-sm rounded focus-none block p-2.5 w-full h-10" disabled>
                </div>

                <div id="name" class="mb-1">
                    <label for="category" class="text-sm font-medium">E-mail: <span class="text-xs text-zinc-400">Telefonis tehtav e-mail ei tohiks sisaldada kirjavahemärke ja sümboleid.</span></label>
                    <input maxlength="50" id="myEmail" value="" class="bg-zinc-900 border border-zinc-700 shadow text-sm rounded focus-none block p-2.5 w-full h-10">
                </div>
            </div>

            <textarea maxlength="535" id="myCandidationText" placeholder="Motivatsioonikiri..." class="bg-zinc-900 border border-zinc-700 shadow text-sm rounded focus-none block p-2.5 w-1/2 resize-none"></textarea>
        </div>

        <button id="submit" class="bg-green-700 hover:bg-green-800 text-white p-2 w-full rounded shadow">Saada</button>
    </div>

    <div 
        id="statement_document" 
        class="hidden absolute w-2/6 bg-zinc-800 text-zinc-200 shadow p-2"
        style="margin: 0 auto; margin-top: 5%; left: 50%; top: 20%; transform: translate(-50%, -50%);"
    >
        <div id="header" class="flex justify-center mb-4">
            <p class="text-xl font-medium uppercase">Avaldus</p>
        </div>

        <div class="flex gap-1 mb-1">
            <div class="w-1/2">
                <div id="name" class="mb-1">
                    <label for="category" class="text-sm font-medium">Nimi:</label>
                    <input id="myName2" value="" class="bg-zinc-900 border border-zinc-700 shadow text-sm rounded focus-none block p-2.5 w-full h-10" disabled>
                </div>

                <div id="name" class="mb-1">
                    <label for="category" class="text-sm font-medium">E-mail: <span class="text-xs text-zinc-400">Telefonis tehtav e-mail ei tohiks sisaldada kirjavahemärke ja sümboleid.</span></label>
                    <input maxlength="50" id="myEmail2" value="" class="bg-zinc-900 border border-zinc-700 shadow text-sm rounded focus-none block p-2.5 w-full h-10">
                </div>
            </div>

            <textarea maxlength="535" id="myStatementText" placeholder="Avaldus..." class="bg-zinc-900 border border-zinc-700 shadow text-sm rounded focus-none block p-2.5 w-1/2 resize-none"></textarea>
        </div>

        <button id="submitStatement" class="bg-green-700 hover:bg-green-800 text-white p-2 w-full rounded shadow">Saada</button>
    </div>
</body>
</html>
