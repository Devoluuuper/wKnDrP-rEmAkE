<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

	<script src="https://cdn.tailwindcss.com"></script>
    <link href="./style.css" rel="stylesheet" type="text/css" />
    <script src="nui://kk-core/web/cdn/jquery.min.js"></script>
    <script src="script.js"></script>

    <title>KKasutaja Taskbar</title>
</head>
<body>
	<div class="w-screen h-screen flex items-center justify-center">
		<div id="task_container" class="hidden text-white w-[15%] h-8 fixed mx-auto bottom-20 inset-x-0">
            <div id="task_labels" class="w-full flex justify-between items-center mb-1 text-sm">
                <span id="task_text" class="leading-relaxed relative text-white z-10 font-[550]">Lammas</span>
                <span id="task_progress" class="leading-relaxed relative text-white z-10 font-normal">100%</span>
            </div>

            <div id="task_bar_container" class="w-full h-full overflow-hidden relative block whitespace-nowrap border rounded-sm border-solid border-zinc-800">
                <div id="task_bar"></div>
                <div id="task_black_bar" class="w-full h-full absolute" style="background: linear-gradient(to right, transparent,#27272A, transparent)"></div>
                <div id="task_kne_bar" class="w-full absolute flex overflow-hidden left-[50%] top-[50%] px-2" style="transform: translate(-50%, -50%);"></div>
            </div>
		</div>
	</div>
</body>
</html>
