<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
	<script src="nui://kk-core/web/cdn/jquery.min.js" type="text/javascript"></script>

	<script src="https://cdn.tailwindcss.com"></script>
	<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.2/css/all.css" integrity="sha384-fnmOCqbTlWIlj8LyTjo7mOUStjsKC4pOpQbqyi7RrhN7udi9RwhKkMHpvLbHG9Sr" crossorigin="anonymous">

	<style>
		/* width */
		::-webkit-scrollbar {
			width: 10px;
		}

		/* Track */
		::-webkit-scrollbar-track {
			background: #3F3F46;
		}

		/* Handle */
		::-webkit-scrollbar-thumb {
			background: #1e1e1f ;
		}

		/* Handle on hover */
		::-webkit-scrollbar-thumb:hover {
			background: #141414;
		}

        textarea:focus, input:focus{
            outline: none;
        }

        #loader {
            display: none;
			width: 32px;
			height: 32px;
			border-radius: 50%;
			border: 3px solid #E5E7EB;
			border-color: #E5E7EB transparent #E5E7EB transparent;
			animation: loader 1.2s linear infinite;
        }

		.dark-theme {
			filter: invert(1) hue-rotate(180deg);
		}

        /* Chrome, Safari, Edge, Opera */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Firefox */
        input[type=number] {
            -moz-appearance: textfield;
        }

        @keyframes loader {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
    </style>

	<script src="script.js" type="text/javascript"></script>
</head>

<body>
    <div id="shopmenu" class="hidden">
        <div 
            class="bg-zinc-800 text-white overflow-y-auto" 
            style="position: absolute; margin: 0 auto; left: 50%; transform: translate(-50%, -50%); top: 40vh; width:85rem;height:42rem"
        >
			<div id="hovering" class="absolute h-12 w-full -mt-10"></div>

			<div class="absolute top-2 left-2 bg-zinc-900 border border-zinc-700 shadow rounded-full">
				<svg id="back" class="w-8 h-8 m-2 text-zinc-300 cursor-pointer" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
					<path stroke-linecap="round" stroke-linejoin="round" d="M9 15L3 9m0 0l6-6M3 9h12a6 6 0 010 12h-3" />
				</svg>
			</div>

            <div id="wrapper" class="p-6 h-full w-full grid grid-cols-3 gap-4"></div>
        </div>

        <img src="nui://kk-core/web/cdn/frame.png" alt="tablet" class="tablet-frame" style="pointer-events: none; position: absolute; margin: 0 auto; left: 50%; transform: translate(-50%, -50%); top: 40vh; width:89.5rem;height:45.5rem"/>
    </div>
</body>

</html>
