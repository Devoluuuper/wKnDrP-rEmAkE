<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WKND RP loading screen</title>
</head>

<body id="body">
    <img src="" alt="" id="loading_image" class="loadingImage">
    <img src="https://wkndrp.ee/assets/wknd_txt_logo.png" alt="Logo" class="logo">
    <div class="overlayTop"></div>
    <div class="overlayBottom" id="overlay_bottom"></div>
    <div id="update_container" class="updateContainer"></div>
</body>

</html>

<script>
    const loading_image = document.getElementById('loading_image');
    const update_container = document.getElementById('update_container');
    const overlay_bottom = document.getElementById('overlay_bottom');

    function loadRandomImage() {
        fetch('https://wkndrp.ee/api/images/loading/random')
            .then(response => response.json())
            .then(data => {
                // Start with pixel_image
                loading_image.src = data.pixel_image;

                // Preload small_image, medium_image, and original_image in order
                const images = [data.small_image, data.medium_image, data.original_image];
                let idx = 0;

                function loadNext() {
                    if (idx >= images.length) return;
                    const img = new Image();
                    img.onload = function () {
                        loading_image.src = images[idx];
                        idx++;
                        loadNext();
                    };
                    img.src = images[idx];
                }

                loadNext();
            })
            .catch(error => {
                console.error('Error fetching images API:', error);
            });
    }

    loadRandomImage();
    setInterval(loadRandomImage, 8000); // KUI KIIRESTI PILT VAHETUB (NUMBER MILLISEKUNDITES)

    fetch('https://wkndrp.ee/api/updates/latest')
        .then(response => response.json())
        .then(data => {
            if (data.is_present) {
                update_container.innerText = `Latest update: ${data.date}`;
                overlay_bottom.style.opacity = 100
            }
        })
        .catch(error => {
            console.error('Error fetching updates API:', error);
        });
</script>

<style>
    @font-face {
        font-family: 'Open Sans';
        src: url('font/OpenSans-VariableFont_wdth,wght.ttf') format('truetype');
        font-weight: 100 900;
        font-stretch: 75% 100%;
        font-style: normal;
    }

    @font-face {
        font-family: 'Open Sans';
        src: url('font/OpenSans-Italic-VariableFont_wdth,wght.ttf') format('truetype');
        font-weight: 100 900;
        font-stretch: 75% 100%;
        font-style: italic;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    body {
        position: relative;
        background-color: #1a1a1a;
        background-repeat: no-repeat;
        object-fit: cover;
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        height: 100svh;
        width: 100svw;

        font-family: 'Open Sans', Arial, sans-serif;
        font-variation-settings: 'wght' 400, 'wdth' 100;
    }

    .loadingImage {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .logo {
        position: absolute;
        top: 10px;
        left: 20px;
        height: 15svh;
        width: auto;
        z-index: 20;
    }

    .updateContainer {
        color: #d4d4d4;
        display: flex;
        position: absolute;
        left: 10px;
        bottom: 10px;
        height: fit-content;
        width: fit-content;
        z-index: 10;
    }

    .overlayTop {
        position: absolute;
        inset: 0;
        z-index: 5;
        user-select: none;
        background: linear-gradient(-35deg, rgba(0, 0, 0, 0), rgba(0, 0, 0, 0) 70%, rgba(0, 0, 0, 0.5) 100%);
    }

    .overlayBottom {
        opacity: 0;
        position: absolute;
        inset: 0;
        z-index: 5;
        user-select: none;
        background: linear-gradient(35deg, rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0) 20%, rgba(0, 0, 0, 0) 100%);
    }

    .loadingSymbol {
        animation: spin 2s linear infinite;

        position: absolute;
        bottom: 20px;
        right: 20px;
        z-index: 10;
        color: #d4d4d4;
        height: 5svh;
        aspect-ratio: 1;
    }
</style>
